services:

  api:
    build:
      context: .
      dockerfile: WebAppTemplate.API/Dockerfile

    ports:
      - "5000:8080"

    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__myConn: "Server=sqlserver,1433;Database=WebAppTemplateDb;User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True;"

    env_file:
      - .env

    depends_on:
      sqlserver:
        condition: service_healthy

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest

    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}

    ports:
      - "1433:1433"

    volumes:
      - sqldata:/var/opt/mssql

    healthcheck:
      test: ["CMD-SHELL", "grep -q 'SQL Server is now ready for client connections' /var/opt/mssql/log/errorlog || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 30s

volumes:
  sqldata:
